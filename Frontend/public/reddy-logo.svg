<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="25%" stop-color="#22c55e"></stop>
      <stop offset="50%" stop-color="#06b6d4"></stop>
      <stop offset="75%" stop-color="#f59e0b"></stop>
      <stop offset="100%" stop-color="#ef4444"></stop>
    </linearGradient>

    <radialGradient id="bgGlow">
      <stop offset="0%" stop-color="#e0f2fe"></stop>
      <stop offset="100%" stop-color="#ffffff"></stop>
    </radialGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="220" fill="url(#bgGlow)" rx="20"></rect>

  <!-- Tech circle icon -->
  <circle cx="110" cy="110" r="70" fill="#111827"></circle>
  <circle cx="110" cy="110" r="50" fill="#1e40af"></circle>

  <!-- R letter -->
  <text x="82" y="132" font-size="70" font-family="Poppins, Arial, sans-serif" fill="#ffffff" font-weight="bold">R</text>

  <!-- Main Text -->
  <text x="200" y="130" font-size="80" font-family="Poppins, Arial, sans-serif" fill="url(#textGradient)" font-weight="800" filter="url(#glow)">
        Reddy
  </text>

  <!-- AI tech dots -->
  <circle cx="610" cy="70" r="6" fill="#22c55e"></circle>
  <circle cx="640" cy="110" r="6" fill="#06b6d4"></circle>
  <circle cx="610" cy="150" r="6" fill="#f59e0b"></circle>

  <!-- connecting lines -->
  <line x1="610" y1="70" x2="640" y2="110" stroke="#94a3b8" stroke-width="2"></line>
  <line x1="640" y1="110" x2="610" y2="150" stroke="#94a3b8" stroke-width="2"></line>

</svg>